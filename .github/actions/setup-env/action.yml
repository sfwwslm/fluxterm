name: Setup FluxTerm Build Environment
description: Setup pnpm, Node.js, Rust toolchain and frontend dependencies.

inputs:
  node-version:
    description: Node.js version to install.
    required: true

runs:
  using: composite
  steps:
    - name: Read Rust toolchain version
      id: rust_toolchain
      shell: bash
      run: |
        channel="$(sed -n 's/^channel = "\(.*\)"$/\1/p' rust-toolchain.toml)"
        if [ -z "$channel" ]; then
          echo "Failed to read Rust channel from rust-toolchain.toml" >&2
          exit 1
        fi
        echo "channel=$channel" >> "$GITHUB_OUTPUT"

    - name: Install pnpm
      uses: pnpm/action-setup@v5
      with:
        run_install: false

    - name: Install Node
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ steps.rust_toolchain.outputs.channel }}

    - name: Install frontend dependencies
      shell: bash
      run: pnpm install --no-frozen-lockfile
