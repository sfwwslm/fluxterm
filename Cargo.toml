[workspace]
resolver = "2"
members = [
    "src-tauri",
    "crates/*",
]

[workspace.package]
version = "0.1.0-alpha.5"
edition = "2024"
authors = ["sfwwslm"]

[workspace.dependencies]
engine = { path = "crates/engine" }

log = "0.4"
serde = { version = "1", features = ["derive"] }
dotenvy = "0.15.7"
tokio = "1"
uuid = "1"
serde_json = "1"
russh = { version = "0.57.1", default-features = false, features = ["flate2", "ring", "rsa"] }

[profile.dev]
incremental = true

[profile.release]
strip = true
lto = true
codegen-units = 1
opt-level = "s"
panic = "abort"
