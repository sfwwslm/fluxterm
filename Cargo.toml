[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
version = "0.1.0-alpha.2"
edition = "2024"
authors = ["sfwwslm"]

[workspace.dependencies]
log = "0.4"
serde = { version = "1", features = ["derive"] }
dotenvy = "0.15.7"
tokio = "1"
uuid = "1"
serde_json = "1"

[profile.dev]
incremental = true

[profile.release]
codegen-units = 1
lto = true
opt-level = "s"
panic = "abort"
strip = true
