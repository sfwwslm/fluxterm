[workspace]
resolver = "2"
members = [
    "crates/*",
]


[workspace.package]
edition = "2024"
authors = [
    "sfwwslm",
]


[workspace.dependencies]
log = { version = "0.4" }
serde = { version = "1", features = ["derive"] }


[profile.dev]
incremental = true


[profile.release]
strip = true
lto = "fat"
